    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">🎂 Birthday</a>
                </div>
            <ul class="nav-menu">

    </audio>

    <section class="page-hero memories-hero">
        <h1>Cherished Memories</h1>
        <p>Our Most Beautiful Moments</p>

    <section class="memories">
        <div class="memories-content">
            <p class="memories-intro">These are the moments that matter most. The times we laughed until our stomachs hurt, the adventures we shared, and the memories we'll treasure forever.</p>
            <div class="memories-grid">
                <div class="memory-card" onclick="openModal(this)">
                    <img src="memo 1.jpg" alt="Memory 1">
                </div>
                <div class="memory-card" onclick="openModal(this)">
                    <img src="memo 2.jpg" alt="Memory 2">
                    
                </div>
                <div class="memory-card" onclick="openModal(this)">

                </div>
                <div class="memory-card" onclick="openModal(this)">
                    <img src="memo 5.jpg" alt="Memory 5">
                   
                </div>

                    <img src="momo 6.jpg" alt="Memory 5">
                   
                </div>
                 <div class="memory-card" onclick="openModal(this)">

                </div>
                <div class="memory-card" onclick="openModal(this)">
                    <img src="memo 8.jpg" alt="Memory 6">
                   
                </div>
            </div>
        </div>
    </section>

        <button class="btn-secondary" onclick="goToPage('about.html')">← Back</button>
        <button class="btn-secondary" onclick="goToPage('journey.html')">Next: Journey →</button>
    </section>

    <!-- Modal -->
    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="/placeholder.svg" alt="">
            <p id="modal-caption"></p>
        </div>
    </div>

    <script src="script.js"></script>
